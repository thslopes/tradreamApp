<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <title>Bollinger Bands Chart</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script
    src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
</head>

<body>
  <h1>Bollinger Bands Chart</h1>
  <form>
    <label for="symbol">Symbol:</label>
    <input type="text" id="symbol" name="symbol" value="BNBBTC" /><br /><br />

    <button type="button" onclick="doCalculate()">Calculate</button>
  </form>

  <h2>Results</h2>
  <canvas id="chart"></canvas>

  <script src="./main.js"></script>
</body>

</html>
