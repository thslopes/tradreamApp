<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Bollinger Bands Chart</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <h1>Bollinger Bands Chart</h1>
    <form>
      <label for="symbol">Symbol:</label>
      <input type="text" id="symbol" name="symbol" value="BTCUSDT" /><br /><br />

      <label for="startTime">Start Time:</label>
      <input type="datetime-local" id="startTime" name="startTime" /><br /><br />

      <label for="endTime">End Time:</label>
      <input type="datetime-local" id="endTime" name="endTime" /><br /><br />

      <button type="button" onclick="doCalculate()">Calculate</button>
    </form>

    <h2>Results</h2>
    <canvas id="chart"></canvas>

    <script>
      async function getKlines(symbol, interval, startTime, endTime, limit) {
        const url = `https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&startTime=${startTime}&endTime=${endTime}&limit=${limit}`;
        const response = await fetch(url);
        const data = await response.json();
        return data;
      }
      function calculateBollingerBands(klines, period = 20, deviation = 2) {
            const closePrices = klines.map((kline) => parseFloat(kline[4]));

            const movingAverages = [];
            const upperBands = [];
            const lowerBands = [];

            for (let i = 0; i < closePrices.length; i++) {
                if (i < period - 1) {
                    movingAverages.push(null);
                    upperBands.push(null);
                    lowerBands.push(null);
                    continue;
                }

                const slice = closePrices.slice(i - period + 1, i + 1);
                const sum = slice.reduce((acc, val) => acc + val, 0);
                const movingAverage = sum / period;
                const standardDeviation =
                    Math.sqrt(
                        slice.reduce((acc, val) => acc + (val - movingAverage) ** 2, 0) /
                        period
                    ) || 0;

                movingAverages.push(movingAverage);
                upperBands.push(movingAverage + deviation * standardDeviation);
                lowerBands.push(movingAverage - deviation * standardDeviation);
            }

            return { movingAverages, upperBands, lowerBands };
        }

      async function doCalculate() {
        const symbol = document.getElementById("symbol").value;
        const startTime = new Date(document.getElementById("startTime").value).getTime();
        const endTime = new Date(document.getElementById("endTime").value).getTime();
        const klines = await getKlines(symbol, "5m", startTime, endTime, 1000);
        debugger
        const { movingAverages, upperBands, lowerBands } = calculateBollingerBands(klines);

        const chartElement = document.getElementById("chart");
        if (window.myChart) {
          window.myChart.destroy();
        }

        const labels = klines.map(kline => new Date(kline[0]).toLocaleString());
        const closePrices = klines.map(kline => kline[4]);

        const data = {
          labels: labels,
          datasets: [
            {
              label: "Close Price",
              data: closePrices,
              borderColor: "rgb(54, 162, 235)",
              tension: 0.1,
            },
            {
              label: "Moving Average",
              data: movingAverages,
              borderColor: "rgb(255, 99, 132)",
              fill: false,
              tension: 0.1,
            },
            {
              label: "Upper Band",
              data: upperBands,
              borderColor: "rgb(75, 192, 192)",
              fill: false,
              tension: 0.1,
            },
            {
              label: "Lower Band",
              data: lowerBands,
              borderColor: "rgb(153, 102, 255)",
              fill: false,
              tension: 0.1,
            },
          ],
        };

        const config = {
          type: "line",
          data: data,
          options: {},
        };

        window.myChart = new Chart(chartElement, config);
      }
    </script>
  </body>
</html>
