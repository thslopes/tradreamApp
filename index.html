<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <title>Bollinger Bands Chart</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <style>
    form {
      max-width: 400px;
      margin: 0 auto;
    }

    input[type="text"],
    button {
      display: block;
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      font-size: 16px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    canvas {
      width: 100%;
      height: auto;
    }
  </style>
</head>

<body>
  <h1>Bollinger Bands Chart</h1>
  <form>
    <label for="symbol">Symbol:</label>
    <select id="symbol">
      <option value="BTCUSDT">BTCBUSD</option>
    </select><br /><br />
    <button type="button" onclick="doCalculate()">Calculate</button>
  </form>

  <h2>Results</h2>
  <canvas id="chart"></canvas>
  <div id="chart_div"></div>

  <script src="./main.js"></script>
</body>

</html>
